<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0D1117">
<title>Plan de Limpieza BK · v2</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✨</text></svg>">
<link rel="manifest" href='data:application/manifest+json,{"name":"Plan Limpieza BK","short_name":"Limpieza BK","start_url":".","display":"standalone","background_color":"%23070A0F","theme_color":"%230D1117","icons":[{"src":"data:image/svg+xml,<svg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 100 100%27><rect width=%27100%27 height=%27100%27 rx=%2722%27 fill=%27%236366F1%27/><text y=%27.9em%27 font-size=%2762%27 x=%2718%27>✨</text></svg>","sizes":"any","type":"image/svg+xml"}]}'>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#070A0F;--s1:#0D1117;--s2:#141920;--s3:#1C2330;
  --border:#1F2937;--border2:#2D3748;
  --text:#F0F4FF;--muted:#4B5563;--muted2:#6B7280;
  --accent:#6366F1;--accent2:#818CF8;--accent3:#A5B4FC;
  --green:#10B981;--red:#F43F5E;--yellow:#FBBF24;
  --purple:#8B5CF6;--cyan:#22D3EE;--orange:#F97316;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:'Space Grotesk',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}
.mono{font-family:'JetBrains Mono',monospace;}
button{font-family:inherit;cursor:pointer;color:inherit;}
::-webkit-scrollbar{width:0;height:0;}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes pop{0%{transform:scale(0)}60%{transform:scale(1.25)}100%{transform:scale(1)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse 80% 50% at 20% -10%,rgba(99,102,241,.08),transparent 60%),
             radial-gradient(ellipse 60% 40% at 85% 110%,rgba(139,92,246,.06),transparent 55%);}

/* BOOT */
#boot{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:500;background:var(--bg);}
#boot .spin{font-size:34px;animation:spin 1s linear infinite;color:var(--accent2);}
#boot .msg{font-size:14px;color:var(--muted2);}

/* GENERIC */
.wrap{max-width:720px;margin:0 auto;padding:0 16px;}
.chip{display:inline-flex;align-items:center;gap:6px;height:30px;padding:0 12px;border-radius:999px;font-size:12px;font-weight:700;}
.dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.bar-track{height:8px;border-radius:999px;background:var(--s3);overflow:hidden;}
.bar-fill{height:100%;border-radius:999px;transition:width .5s cubic-bezier(.4,0,.2,1);}
.divline{flex:1;height:1px;background:var(--border);}

/* LAUNCHER */
#launcher{position:relative;z-index:1;padding:34px 0 60px;animation:fadeUp .3s ease;}
.lh-head{display:flex;align-items:center;gap:12px;margin-bottom:6px;}
.bk-pill{background:linear-gradient(135deg,#D62300,#FF4500);color:#fff;font-size:10px;font-weight:700;letter-spacing:2.5px;padding:4px 10px;border-radius:5px;}
.lh-title{font-size:22px;font-weight:700;letter-spacing:-.4px;}
.lh-sub{font-size:13px;color:var(--muted2);margin:2px 0 22px;}
.rest-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
@media(max-width:460px){.rest-grid{grid-template-columns:1fr;}}
.rest-tile{background:linear-gradient(150deg,var(--s2),var(--s1));border:1px solid var(--border2);border-radius:18px;padding:16px 18px 17px;text-align:left;transition:all .2s;position:relative;overflow:hidden;box-shadow:0 6px 20px rgba(0,0,0,.45),inset 0 1px 0 rgba(255,255,255,.04);}
.rest-tile::before{content:'';position:absolute;top:0;left:0;bottom:0;width:5px;background:var(--rc,var(--accent));box-shadow:0 0 16px var(--rc,var(--accent));}
.rest-tile::after{content:'';position:absolute;top:-30px;right:-30px;width:120px;height:120px;border-radius:50%;background:radial-gradient(circle,var(--rc,var(--accent)),transparent 70%);opacity:.14;pointer-events:none;}
.rest-tile:active{transform:scale(.98);}
.rest-tile:hover{border-color:var(--rc,var(--border2));transform:translateY(-2px);box-shadow:0 14px 34px rgba(0,0,0,.5);}
.rest-tile .rt-top{display:flex;align-items:center;gap:9px;margin-bottom:13px;}
.rest-tile .rt-name{font-size:15px;font-weight:700;color:var(--text);}
.rest-tile .rt-pct{font-size:33px;font-weight:800;letter-spacing:-1px;line-height:1;}
.rest-tile .rt-sub{font-size:10px;color:var(--muted2);text-transform:uppercase;letter-spacing:1px;margin-top:4px;font-weight:600;}
.rest-tile .rt-mini{margin-top:12px;height:6px;border-radius:999px;background:var(--s3);overflow:hidden;}
.rest-tile .rt-stats{display:flex;gap:6px;margin-top:12px;}
.rest-tile .rt-stats>div{flex:1;background:var(--s3);border-radius:9px;padding:7px 3px;text-align:center;}
.rest-tile .rt-stats .sl{display:block;font-size:8px;font-weight:700;letter-spacing:.5px;color:var(--muted2);text-transform:uppercase;margin-bottom:2px;}
.rest-tile .rt-stats .sv{font-size:14px;font-weight:800;}
.rest-tile.champ{box-shadow:0 0 0 2px rgba(251,191,36,.55),0 10px 30px rgba(0,0,0,.55);}
.rest-tile.champ::before{background:var(--yellow);box-shadow:0 0 18px var(--yellow);}
.rest-tile .rt-crown{margin-left:auto;font-size:16px;}
.rest-tile .rt-phrase{font-size:11px;color:rgba(251,191,36,.9);font-style:italic;margin-top:10px;line-height:1.3;}
.resp-btn{margin-top:22px;width:100%;background:linear-gradient(135deg,rgba(251,191,36,.12),rgba(245,158,11,.06));border:1px solid rgba(251,191,36,.3);color:var(--yellow);border-radius:14px;padding:15px;font-size:14px;font-weight:700;transition:all .2s;}
.resp-btn:hover{background:rgba(251,191,36,.16);}

/* TOPBAR (in-restaurant) */
.tb{position:sticky;top:0;z-index:40;background:rgba(7,10,15,.9);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);}
.tb-row{display:flex;align-items:center;gap:10px;padding:12px 16px 10px;max-width:720px;margin:0 auto;}
.tb-back{background:var(--s2);border:1px solid var(--border);border-radius:9px;width:34px;height:34px;font-size:16px;color:var(--accent2);flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.tb-name{font-size:16px;font-weight:700;letter-spacing:-.3px;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tb-user{display:flex;align-items:center;gap:7px;background:var(--s2);border:1px solid var(--border);border-radius:999px;padding:4px 5px 4px 11px;font-size:12px;font-weight:700;white-space:nowrap;}
.tb-user .av{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;}
.tb-exit{background:rgba(244,63,94,.14);border:1px solid rgba(244,63,94,.3);color:var(--red);border-radius:7px;padding:4px 8px;font-size:10px;font-weight:800;letter-spacing:.3px;}
/* TABS */
.tabs{display:flex;gap:5px;padding:0 16px 10px;max-width:720px;margin:0 auto;}
.tab{flex:1;text-align:center;padding:10px 0;border-radius:11px;font-size:13px;font-weight:700;background:var(--s2);border:1px solid var(--border);color:var(--muted2);transition:all .15s;}
.tab.on{background:rgba(99,102,241,.18);border-color:rgba(99,102,241,.4);color:var(--accent3);}

.content{position:relative;z-index:1;max-width:720px;margin:0 auto;padding:16px 16px 90px;animation:fadeUp .25s ease;}

/* sub-controls */
.ctl-row{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap;}
.seg{display:flex;gap:4px;background:var(--s2);border:1px solid var(--border);border-radius:11px;padding:4px;}
.seg button{border:none;background:none;color:var(--muted2);font-size:12px;font-weight:700;padding:7px 14px;border-radius:8px;}
.seg button.on{background:var(--accent);color:#0b0e14;}
.nav-btn{background:var(--s2);border:1px solid var(--border);color:var(--accent2);width:32px;height:32px;border-radius:9px;font-size:16px;display:flex;align-items:center;justify-content:center;}
.toggle{display:inline-flex;align-items:center;gap:9px;height:34px;padding:0 6px 0 13px;border-radius:999px;background:var(--s2);border:1px solid var(--border);font-size:12px;font-weight:700;color:var(--muted2);}
.toggle.on{background:rgba(16,185,129,.12);border-color:rgba(16,185,129,.35);color:var(--green);}
.toggle .sw{width:34px;height:19px;border-radius:999px;background:var(--border2);position:relative;transition:background .15s;flex-shrink:0;}
.toggle.on .sw{background:var(--green);}
.toggle .sw::after{content:'';position:absolute;top:2px;left:2px;width:15px;height:15px;border-radius:50%;background:#0b0e14;transition:left .15s;}
.toggle.on .sw::after{left:17px;}

/* progress header */
.prog-card{background:var(--s1);border:1px solid var(--border);border-radius:16px;padding:16px 18px;margin-bottom:14px;}
.prog-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:11px;}
.prog-lbl{font-size:13px;font-weight:600;color:var(--muted2);}
.prog-val{font-size:16px;font-weight:800;}

/* zone (collapsible) */
.zone{background:var(--s1);border:1px solid var(--border);border-radius:14px;margin-bottom:10px;overflow:hidden;}
.zone.open{border-color:var(--border2);}
.zone-hd{display:flex;align-items:center;gap:11px;padding:14px 15px;user-select:none;}
.zone-hd .zn{font-size:14px;font-weight:700;flex:1;}
.zone-hd .mini{width:50px;height:6px;border-radius:999px;background:var(--s3);overflow:hidden;}
.zone-hd .frac{font-size:12px;font-weight:800;color:var(--muted2);min-width:34px;text-align:right;}
.zone-hd .chev{color:var(--muted);font-size:14px;transition:transform .2s;}
.zone.open .zone-hd .chev{transform:rotate(90deg);}
.zone-body{display:none;padding:0 6px 8px;}
.zone.open .zone-body{display:block;}
.zone-done .zone-hd .zn{color:var(--muted2);}

/* daily task */
.t{display:flex;align-items:center;gap:12px;padding:11px 9px;border-top:1px solid var(--border);cursor:pointer;}
.t:first-child{border-top:none;}
.t .box{width:22px;height:22px;border-radius:7px;border:1.5px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;transition:all .15s;}
.t.done .box{background:var(--green);border-color:var(--green);color:#0b0e14;animation:pop .25s ease;}
.t .nm{flex:1;font-size:14px;font-weight:500;line-height:1.3;}
.t.done .nm{text-decoration:line-through;color:var(--muted);}
.t .tm{font-size:11px;color:var(--muted);flex-shrink:0;}
.t .who{font-size:14px;flex-shrink:0;}
.t .edit{background:none;border:none;color:transparent;font-size:13px;flex-shrink:0;padding:0 2px;}
.t:hover .edit{color:var(--muted);}

/* weekly/monthly card */
.card{background:var(--s1);border:1px solid var(--border);border-radius:13px;margin-bottom:8px;overflow:hidden;}
.card.done{background:rgba(16,185,129,.05);border-color:rgba(16,185,129,.2);}
.card-main{display:flex;align-items:center;gap:11px;padding:12px 14px;cursor:pointer;}
.card .box{width:22px;height:22px;border-radius:7px;border:1.5px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;}
.card.done .box{background:var(--green);border-color:var(--green);color:#0b0e14;}
.card .ci{flex:1;min-width:0;}
.card .cn{font-size:13.5px;font-weight:500;line-height:1.3;}
.card.done .cn{text-decoration:line-through;color:var(--muted);}
.card .cmeta{font-size:10.5px;color:var(--muted);margin-top:4px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.freq{background:var(--s3);border:1px solid var(--border);border-radius:5px;padding:1px 6px;font-size:9px;font-weight:700;letter-spacing:.4px;color:var(--muted2);}
.cam{width:32px;height:32px;border-radius:9px;background:var(--s2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;}
.cam.has{border-color:var(--cyan);color:var(--cyan);background:rgba(34,211,238,.08);}
.photo-area{display:none;padding:0 14px 14px;flex-direction:column;gap:8px;}
.photo-area.open{display:flex;animation:fadeUp .2s ease;}
.pgal{display:flex;gap:6px;flex-wrap:wrap;}
.pgal .pw{position:relative;width:84px;height:84px;border-radius:9px;overflow:hidden;border:1px solid var(--border);}
.pgal img{width:100%;height:100%;object-fit:cover;display:block;cursor:zoom-in;}
.pgal .rm{position:absolute;top:3px;right:3px;background:rgba(0,0,0,.6);border:none;color:#fff;width:20px;height:20px;border-radius:50%;font-size:11px;}
.puz{border:1.5px dashed var(--border2);border-radius:10px;padding:14px;text-align:center;position:relative;font-size:12px;color:var(--muted2);}
.puz input{position:absolute;inset:0;opacity:0;width:100%;height:100%;cursor:pointer;}
.pbtns{display:flex;gap:8px;}
.pbtn{flex:1;position:relative;border:1.5px dashed var(--border2);border-radius:10px;padding:13px 8px;text-align:center;font-size:12px;font-weight:700;color:var(--muted2);background:rgba(255,255,255,.01);}
.pbtn:hover{border-color:var(--accent);color:var(--accent2);background:rgba(99,102,241,.05);}
.pbtn .pi{font-size:19px;display:block;margin-bottom:3px;}
.pbtn input{position:absolute;inset:0;opacity:0;width:100%;height:100%;cursor:pointer;}
.pcount{font-size:11px;color:var(--muted);text-align:center;margin-bottom:8px;}

/* winner + member phrases */
.winner{background:linear-gradient(135deg,rgba(251,191,36,.15),rgba(245,158,11,.05));border:2px solid rgba(251,191,36,.5);border-radius:18px;padding:22px;text-align:center;position:relative;overflow:hidden;box-shadow:0 0 40px rgba(251,191,36,.12),0 8px 32px rgba(0,0,0,.3);margin-bottom:14px;}
.winner::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 50% -10%,rgba(251,191,36,.2),transparent 65%);pointer-events:none;}
.winner>*{position:relative;}
.winner .wc{font-size:40px;line-height:1;filter:drop-shadow(0 2px 8px rgba(251,191,36,.5));}
.winner .wl{font-size:10px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:rgba(251,191,36,.7);margin:8px 0 4px;}
.winner .wn{font-size:23px;font-weight:800;color:var(--yellow);text-shadow:0 0 20px rgba(251,191,36,.3);}
.winner .wp{font-size:36px;font-weight:800;color:var(--yellow);margin-top:8px;line-height:1;}
.winner .ws{font-size:10px;color:rgba(251,191,36,.6);letter-spacing:.8px;text-transform:uppercase;margin-top:4px;}
.winner .wph{font-size:12.5px;color:rgba(251,191,36,.85);font-style:italic;margin-top:11px;}
.mn2{flex:1;min-width:0;}
.mnm{font-size:13.5px;font-weight:700;}
.mph{font-size:10.5px;color:var(--muted2);font-style:italic;margin-top:1px;line-height:1.3;}
.mrow-top{background:linear-gradient(135deg,rgba(251,191,36,.1),transparent);border-radius:11px;margin:3px 0;padding:9px 9px;border-top:none;box-shadow:inset 0 0 0 1px rgba(251,191,36,.2);}
.mrow-top+.mrow{border-top:none;}

/* team wheel */
.tp{background:var(--s1);border:1px solid var(--border);border-radius:14px;padding:16px;}
.tp-hd{font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.tp-cols{display:flex;gap:18px;align-items:flex-start;flex-wrap:wrap;}
.mrow{display:flex;align-items:center;gap:10px;padding:9px 0;border-top:1px solid rgba(255,255,255,.05);}
.mrow:first-child{border-top:none;}
.mrow .rk{width:22px;text-align:center;font-size:12px;font-weight:800;color:var(--muted);flex-shrink:0;}
.mrow .mav{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.mrow .mn{flex:1;font-size:13.5px;font-weight:600;}
.mrow .mp{font-size:13px;font-weight:800;flex-shrink:0;}

/* PIN + user selector + modals */
.ov{position:fixed;inset:0;z-index:200;background:rgba(7,10,15,.96);backdrop-filter:blur(18px);display:none;align-items:center;justify-content:center;padding:18px;}
.ov.open{display:flex;animation:fadeUp .2s ease;}
.pin{display:flex;flex-direction:column;align-items:center;width:100%;max-width:320px;position:relative;}
.pin .back{position:absolute;top:-6px;left:0;background:none;border:none;color:var(--muted2);font-size:13px;font-weight:600;}
.pin .pdot{width:14px;height:14px;border-radius:50%;margin-bottom:12px;box-shadow:0 0 16px currentColor;}
.pin .pname{font-size:20px;font-weight:700;margin-bottom:6px;text-align:center;}
.pin .plbl{font-size:12px;color:var(--muted2);margin-bottom:24px;text-align:center;}
.pdots{display:flex;gap:14px;margin-bottom:10px;}
.pd{width:14px;height:14px;border-radius:50%;border:2px solid var(--border2);transition:all .15s;}
.pd.f{background:var(--accent2);border-color:var(--accent2);box-shadow:0 0 8px rgba(129,140,248,.6);}
.pd.e{background:var(--red);border-color:var(--red);animation:shake .3s ease;}
.perr{height:18px;font-size:11px;color:var(--red);font-weight:600;margin-bottom:18px;text-align:center;}
.pgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:100%;max-width:250px;}
.pk{background:var(--s2);border:1px solid var(--border);border-radius:12px;color:var(--text);font-size:22px;font-weight:600;height:62px;box-shadow:0 2px 0 var(--border);transition:transform .08s;}
.pk:active{transform:scale(.93);box-shadow:none;}
.pk.empty{background:none;border:none;box-shadow:none;}

.usel{width:100%;max-width:380px;background:var(--s1);border:1px solid var(--border);border-radius:18px;padding:22px 18px 26px;}
.usel .ut{font-size:18px;font-weight:700;text-align:center;}
.usel .us{font-size:12px;color:var(--muted2);text-align:center;margin:4px 0 18px;}
.ugrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;max-height:52vh;overflow-y:auto;}
.ubtn{background:var(--s2);border:1px solid var(--border);border-radius:14px;padding:14px 10px;text-align:center;transition:all .15s;}
.ubtn:hover{border-color:var(--border2);background:var(--s3);}
.ubtn .uav{width:50px;height:50px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:26px;margin:0 auto 9px;}
.ubtn .un{font-size:13.5px;font-weight:700;}
.uadd{grid-column:1/-1;border:1.5px dashed rgba(99,102,241,.3);background:none;color:rgba(129,140,248,.8);border-radius:12px;padding:12px;font-size:13px;font-weight:600;}
.inp{width:100%;background:var(--s2);border:1px solid var(--border);border-radius:10px;color:var(--text);padding:10px 12px;font-size:14px;font-family:inherit;}
.inp:focus{outline:none;border-color:var(--accent);}

.modal{width:100%;max-width:400px;background:var(--s1);border:1px solid rgba(99,102,241,.25);border-radius:18px;padding:22px;position:relative;}
.modal h3{font-size:17px;font-weight:700;margin-bottom:18px;}
.fld{margin-bottom:13px;}
.fld label{display:block;font-size:10px;color:var(--muted2);text-transform:uppercase;letter-spacing:1px;font-weight:700;margin-bottom:6px;}
.fld select.inp{appearance:none;}
.mbtns{display:flex;gap:8px;margin-top:18px;}
.btn{border:none;border-radius:10px;padding:11px 16px;font-size:13px;font-weight:700;font-family:inherit;}
.btn-primary{flex:1;background:linear-gradient(135deg,var(--accent),var(--purple));color:#fff;}
.btn-ghost{background:var(--s3);border:1px solid var(--border);color:var(--muted2);}
.btn-danger{background:rgba(244,63,94,.12);border:1px solid rgba(244,63,94,.3);color:var(--red);}
.add-task{width:100%;background:none;border:1.5px dashed rgba(99,102,241,.3);color:rgba(129,140,248,.75);border-radius:11px;padding:11px;font-size:12.5px;font-weight:700;margin-top:8px;}

/* global (responsable) */
.gwrap{position:relative;z-index:1;max-width:720px;margin:0 auto;padding:20px 16px 80px;animation:fadeUp .25s ease;}
.gsum{display:grid;grid-template-columns:1fr;gap:12px;margin-bottom:16px;}

<script>
/* ════════════════════════════════════════════════════════════════
   PLAN DE LIMPIEZA BK · v2 (rediseño) — archivo NUEVO (no reemplaza
   el index.html en producción). Lee/escribe las MISMAS claves de
   Supabase que la app actual → 100% compatible. Ver backend-spec.md
════════════════════════════════════════════════════════════════ */
const SUPA_URL='https://yughskqmcbbdehcryzkx.supabase.co';
const SUPA_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl1Z2hza3FtY2JiZGVoY3J5emt4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMyNDgxODUsImV4cCI6MjA5ODgyNDE4NX0.ztmdAGgByYSVunrzL1GMvaDbdxJ0omYXy15aXruWtVA';
const SUPA_HDR={'Content-Type':'application/json','apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY};

const RESTAURANTS=[
  {id:'adeje',name:'Adeje',color:'#FF6B6B'},{id:'chafiras',name:'Chafiras',color:'#4ECDC4'},
  {id:'leroy',name:'Leroy Adeje',color:'#F59E0B'},{id:'crist',name:'Cristianos',color:'#A78BFA'},
  {id:'llanos',name:'Los Llanos Aridane',color:'#22C55E'},{id:'fanabe',name:'Playa Fañabe',color:'#F97316'},
  {id:'paraiso',name:'Playa Paraíso',color:'#06B6D4'},{id:'siam',name:'Siam Mall',color:'#EC4899'},
];
const WEEKLY_SECTIONS={'zona-hd':'Zona HD','zona-cocina':'Zona Cocina','zona-barra':'Zona Barra','utensilios':'Utensilios / Cacharros'};
const DAILY_ZONES={'barra':'Barra','cocina':'Cocina','sala':'Sala','sotano':'Sótano'};
const ZONE_COLOR={'barra':'#3b9db5','cocina':'#c98a3b','sala':'#8b6fc9','sotano':'#5a8f6b',
  'zona-hd':'#3b9db5','zona-cocina':'#c98a3b','zona-barra':'#8b6fc9','utensilios':'#5a8f6b'};
const MONTHS_ES=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const AVATAR_EMOJIS=['🐯','🦊','🐸','🐼','🦁','🐶','🐱','🐨','🐧','🦋','🦄','🐺','🦅','🐙','🦖','🐬','🐻','🦒','🐝','🦩'];
const AVATAR_COLORS=['#6366F1','#EC4899','#10B981','#F59E0B','#06B6D4','#F97316','#8B5CF6','#EF4444','#22C55E','#3B82F6'];
const QUICK_VIEW_PIN='3559';
const ADMIN_PIN_KEY='bk_admin_pin';

const SK='bk_plan_v3';
let state={};try{state=JSON.parse(localStorage.getItem(SK)||'{}');}catch(e){}
if(!state.whoChecked)state.whoChecked={};

/* ── helpers ── */
function pad(n){return String(n).padStart(2,'0');}
function todayStr(){const d=new Date();return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;}
function fmtDate(s){if(!s)return'';const[y,m,d]=s.split('-');return `${d}/${m}`;}
function getWeekKey(off=0){const d=new Date();d.setDate(d.getDate()+off*7);d.setHours(0,0,0,0);d.setDate(d.getDate()-((d.getDay()+6)%7));const jan1=new Date(d.getFullYear(),0,1);const wn=Math.ceil((((d-jan1)/86400000)+1)/7);return `${d.getFullYear()}-W${pad(wn)}`;}
function weekLabel(off=0){const mon=new Date();mon.setDate(mon.getDate()-(((mon.getDay()+6)%7))+off*7);const sun=new Date(mon);sun.setDate(sun.getDate()+6);return `${pad(mon.getDate())}/${pad(mon.getMonth()+1)} – ${pad(sun.getDate())}/${pad(sun.getMonth()+1)}`;}
function monthKey(rid,off=0){const d=new Date();d.setMonth(d.getMonth()+off);return `m-${rid}-${d.getFullYear()}-${d.getMonth()}`;}
function monthLabel(off=0){const d=new Date();d.setMonth(d.getMonth()+off);return `${MONTHS_ES[d.getMonth()]} ${d.getFullYear()}`;}
function ck(rid,type,period,taskId){return `chk-${rid}-${type}-${period}-${taskId}`;}
function getCurrentShift(){const h=new Date().getHours();return (h>=4&&h<18)?'ape':'cie';}
function persistLocal(){try{localStorage.setItem(SK,JSON.stringify(state));}catch(e){}}
function getEntry(k){return state[k]||{done:false,date:null};}
function getWho(k){return state.whoChecked&&state.whoChecked[k];}
function setWho(k,m){if(!state.whoChecked)state.whoChecked={};state.whoChecked[k]=m;persistLocal();}
function clearWho(k){if(state.whoChecked)delete state.whoChecked[k];persistLocal();}
function pinHash(s){let h=0;for(let i=0;i<s.length;i++){h=(Math.imul(31,h)+s.charCodeAt(i))|0;}return h.toString(36);}
function memberEmoji(m){if(!m||!m.id)return'👤';let h=0;for(let i=0;i<m.id.length;i++)h=(h*31+m.id.charCodeAt(i))|0;return AVATAR_EMOJIS[Math.abs(h)%AVATAR_EMOJIS.length];}
function getTeam(rid){if(!state.team)state.team={};if(!state.team[rid])state.team[rid]=[];return state.team[rid];}
function getTasks(rid,type){const t=state.tasks&&state.tasks[rid]&&state.tasks[rid][type];return t||(type==='weekly'?{}:[]);}
function restById(rid){return RESTAURANTS.find(r=>r.id===rid);}
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

/* ── Supabase ── */
async function supaGet(key){try{const r=await fetch(`${SUPA_URL}/rest/v1/bk_state?key=eq.${encodeURIComponent(key)}&select=value`,{headers:SUPA_HDR});const d=await r.json();return d&&d[0]?d[0].value:null;}catch(e){return null;}}
async function supaSet(key,value){try{await fetch(`${SUPA_URL}/rest/v1/bk_state`,{method:'POST',headers:{...SUPA_HDR,'Prefer':'resolution=merge-duplicates'},body:JSON.stringify({key,value,updated_at:new Date().toISOString()})});}catch(e){}}
async function supaDel(key){try{await fetch(`${SUPA_URL}/rest/v1/bk_state?key=eq.${encodeURIComponent(key)}`,{method:'DELETE',headers:SUPA_HDR});}catch(e){}}
async function supaGetPhoto(key){try{const r=await fetch(`${SUPA_URL}/rest/v1/bk_photos?key=eq.${encodeURIComponent(key)}&select=data`,{headers:SUPA_HDR});const d=await r.json();return d&&d[0]?d[0].data:null;}catch(e){return null;}}
async function supaSetPhoto(key,data){try{await fetch(`${SUPA_URL}/rest/v1/bk_photos`,{method:'POST',headers:{...SUPA_HDR,'Prefer':'resolution=merge-duplicates'},body:JSON.stringify({key,data,updated_at:new Date().toISOString()})});}catch(e){}}
async function supaDelPhoto(key){try{await fetch(`${SUPA_URL}/rest/v1/bk_photos?key=eq.${encodeURIComponent(key)}`,{method:'DELETE',headers:SUPA_HDR});}catch(e){}}

let _lastSentinel=null;
async function saveCheck(key){persistLocal();const e=state[key]||{done:false,date:null};await supaSet('chk::'+key,{done:!!e.done,date:e.date||null});const who=getWho(key);if(who)await supaSet('who::'+key,who);else await supaDel('who::'+key);const ts=Date.now().toString();await supaSet('sentinel',{ts});_lastSentinel=ts;}
async function saveTasks(rid){await supaSet('tasks_'+rid,state.tasks[rid]);}
async function saveTeam(rid){await supaSet('team_'+rid,state.team[rid]);}
async function saveConfig(){await supaSet('config',{pins:state.pins||{},mgr_pins:state.mgr_pins||{}});}

async function loadFromSupabase(){
  try{
    const config=await supaGet('config');
    if(config){state.pins=config.pins||{};state.mgr_pins=config.mgr_pins||{};}
    if(!state.pins)state.pins={};if(!state.mgr_pins)state.mgr_pins={};
    if(!state.team)state.team={};if(!state.tasks)state.tasks={};
    for(const r of RESTAURANTS){const t=await supaGet('team_'+r.id);if(t)state.team[r.id]=t;const tk=await supaGet('tasks_'+r.id);if(tk)state.tasks[r.id]=tk;}
    const cr=await fetch(`${SUPA_URL}/rest/v1/bk_state?key=like.chk%3A%3A*&select=key,value&limit=5000`,{headers:{...SUPA_HDR,'Accept':'application/json'}});
    if(cr.ok){const rows=await cr.json();if(Array.isArray(rows))rows.forEach(row=>{state[row.key.replace(/^chk::/,'')]=row.value;});}
    const wr=await fetch(`${SUPA_URL}/rest/v1/bk_state?key=like.who%3A%3A*&select=key,value&limit=5000`,{headers:{...SUPA_HDR,'Accept':'application/json'}});
    if(wr.ok){const rows=await wr.json();if(Array.isArray(rows)){if(!state.whoChecked)state.whoChecked={};rows.forEach(row=>{state.whoChecked[row.key.replace(/^who::/,'')]=row.value;});}}
    persistLocal();return true;
  }catch(e){console.warn(e);return false;}
}

/* ════════ SESSION / UI STATE ════════ */
let S={view:'launcher',rid:null,role:null,member:null,tab:'hoy',shift:getCurrentShift(),
       week:0,month:0,onlyPending:false,openZones:{},photoLoaded:{}};
const $=id=>document.getElementById(id);
function toast(msg,err){const t=$('toast');t.textContent=msg;t.style.borderColor=err?'var(--red)':'var(--border2)';t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2100);}
function showLB(src){$('lb-img').src=src;$('lb').classList.add('open');}
function isAdmin(){return S.role==='admin';}
function isManager(){return S.role==='manager';}
function canEdit(){return S.role==='admin'||S.role==='manager';}
function canCheck(){return S.role!=='view';}

/* ════════ PROGRESS CALC ════════ */
function dailyTaskList(rid){return [...getTasks(rid,'ape'),...getTasks(rid,'cie')];}
function restDailyPct(rid){const day=todayStr();const list=dailyTaskList(rid);if(!list.length)return 0;let d=0;list.forEach(t=>{const sh=getTasks(rid,'ape').includes(t)?'ape':'cie';if(getEntry(ck(rid,'d',day,t.id)).done)d++;});return Math.round(d/list.length*100);}
function restPeriodPct(rid){const day=todayStr(),wk=getWeekKey(0),mk=monthKey(rid,0);const keys=[];dailyTaskList(rid).forEach(t=>keys.push(ck(rid,'d',day,t.id)));Object.values(getTasks(rid,'weekly')).flat().forEach(t=>keys.push(ck(rid,'w',wk,t.id)));getTasks(rid,'monthly').forEach(t=>keys.push(ck(rid,'m',mk,t.id)));if(!keys.length)return 0;const done=keys.filter(k=>getEntry(k).done).length;return Math.round(done/keys.length*100);}
function restWeekPct(rid){const wk=getWeekKey(0);const list=Object.values(getTasks(rid,'weekly')).flat();if(!list.length)return 0;const d=list.filter(t=>getEntry(ck(rid,'w',wk,t.id)).done).length;return Math.round(d/list.length*100);}
function restMonthlyPct(rid){const mk=monthKey(rid,0);const list=getTasks(rid,'monthly');if(!list.length)return 0;const d=list.filter(t=>getEntry(ck(rid,'m',mk,t.id)).done).length;return Math.round(d/list.length*100);}
function motivPhrase(pct){if(pct===0)return{e:'😴',t:'¡Aún sin empezar! El equipo te espera.'};if(pct<25)return{e:'🐢',t:'Poco a poco... ¡a por más!'};if(pct<50)return{e:'💪',t:'¡Buen ritmo! Sigue así.'};if(pct<75)return{e:'🔥',t:'¡Estás que ardes! Casi lo tienes.'};if(pct<100)return{e:'⭐',t:'Rozando la excelencia. ¡Increíble!'};return{e:'🏆',t:'¡100%! Eres el MVP del turno.'};}
function memberPct(rid,mid){
  const day=todayStr(),wk=getWeekKey(0),mk=monthKey(rid,0);const keys=[];
  dailyTaskList(rid).forEach(t=>keys.push(ck(rid,'d',day,t.id)));
  Object.values(getTasks(rid,'weekly')).flat().forEach(t=>keys.push(ck(rid,'w',wk,t.id)));
  getTasks(rid,'monthly').forEach(t=>keys.push(ck(rid,'m',mk,t.id)));
  if(!keys.length)return 0;const done=keys.filter(k=>getEntry(k).done&&getWho(k)===mid).length;return Math.round(done/keys.length*100);
}

/* ════════ RENDER ROUTER ════════ */
function render(){
  const app=$('app');
  if(S.view==='launcher')app.innerHTML=viewLauncher();
  else if(S.view==='global')app.innerHTML=viewGlobal();
  else if(S.view==='rest')app.innerHTML=viewRest();
  bindDynamic();
}

/* ════════ LAUNCHER ════════ */
function viewLauncher(){
  const monthRanked=RESTAURANTS.map(r=>({...r,mpct:restPeriodPct(r.id)})).sort((a,b)=>b.mpct-a.mpct);
  const champ=monthRanked[0].mpct>0?monthRanked[0]:null;
  const sc=v=>v>=60?'var(--green)':v>=25?'var(--yellow)':v>0?'var(--orange)':'var(--muted)';
  const tiles=RESTAURANTS.map(r=>{const accum=restPeriodPct(r.id),day=restDailyPct(r.id),wkp=restWeekPct(r.id),mop=restMonthlyPct(r.id);const isChamp=champ&&r.id===champ.id;return `
    <button class="rest-tile ${isChamp?'champ':''}" style="--rc:${r.color}" onclick="tapRestaurant('${r.id}')">
      <div class="rt-top"><span class="dot" style="background:${r.color};box-shadow:0 0 8px ${r.color}"></span><span class="rt-name">${esc(r.name)}</span>${isChamp?'<span class="rt-crown">👑</span>':''}</div>
      <div class="rt-pct mono" style="color:${accum>0?'var(--text)':'var(--muted)'}">${accum}%</div>
      <div class="rt-sub">acumulado del mes</div>
      <div class="rt-mini"><span class="bar-fill" style="width:${accum}%;background:${isChamp?'var(--yellow)':r.color}"></span></div>
      <div class="rt-stats">
        <div><span class="sl">Hoy</span><span class="sv mono" style="color:${sc(day)}">${day}%</span></div>
        <div><span class="sl">Semana</span><span class="sv mono" style="color:${sc(wkp)}">${wkp}%</span></div>
        <div><span class="sl">Mes</span><span class="sv mono" style="color:${sc(mop)}">${mop}%</span></div>
      </div>
      ${isChamp?`<div class="rt-phrase">👑 ${motivPhrase(accum).t}</div>`:''}
    </button>`;}).join('');
  return `<div class="wrap" id="launcher">
    <div class="lh-head"><span class="bk-pill">BK</span><span class="lh-title">Plan de Limpieza</span></div>
    <div class="lh-sub">Elige tu restaurante para fichar las tareas de hoy</div>
    <div class="rest-grid">${tiles}</div>
    <button class="resp-btn" onclick="tapResponsable()">👤 Cintia</button>
  </div>`;
}

/* ════════ IN-RESTAURANT ════════ */
function viewRest(){
  const r=restById(S.rid);
  const roleTag=S.role==='manager'?'<span style="font-size:9px;background:rgba(251,191,36,.15);color:var(--yellow);border-radius:4px;padding:1px 5px;margin-left:5px;">GERENTE</span>':S.role==='view'?'<span style="font-size:9px;background:var(--s3);color:var(--muted2);border-radius:4px;padding:1px 5px;margin-left:5px;">VISTA</span>':'';
  const userChip=S.member?`<div class="tb-user"><span class="av" style="background:linear-gradient(135deg,${S.member.color}cc,${S.member.color}66)">${memberEmoji(S.member)}</span><span>${esc(S.member.name)}${roleTag}</span><button class="tb-exit" onclick="exitRestaurant()">SALIR</button></div>`
     :`<div class="tb-user"><span>${S.role==='view'?'👁 Vista':'🔑 Gerente'}${roleTag}</span><button class="tb-exit" onclick="exitRestaurant()">SALIR</button></div>`;
  const tabs=[['hoy','Hoy'],['semana','Semana'],['mes','Mes'],['equipo','Equipo']].map(([k,l])=>`<button class="tab ${S.tab===k?'on':''}" onclick="setTab('${k}')">${l}</button>`).join('');
  let body='';
  if(S.tab==='hoy')body=renderHoy();
  else if(S.tab==='semana')body=renderSemana();
  else if(S.tab==='mes')body=renderMes();
  else if(S.tab==='equipo')body=renderEquipo();
  const mgrBtn=(!isManager()&&!isAdmin()&&S.role!=='view')?`<button class="tab" style="flex:0 0 auto;padding:10px 12px;color:var(--yellow);border-color:rgba(251,191,36,.3)" onclick="openManagerPin()">🔑</button>`:'';
  return `<div class="tb">
      <div class="tb-row"><button class="tb-back" onclick="exitRestaurant()">‹</button><div class="tb-name"><span class="dot" style="display:inline-block;background:${r.color};margin-right:7px"></span>${esc(r.name)}</div>${userChip}</div>
      <div class="tabs">${tabs}${mgrBtn}</div>
    </div>
    <div class="content" id="content">${body}</div>`;
}

/* ── HOY (daily, collapsible zones) ── */
function renderHoy(){
  const rid=S.rid,day=todayStr();
  const shiftTasks=getTasks(rid,S.shift);
  // group by zone
  const zones={};Object.keys(DAILY_ZONES).forEach(z=>zones[z]=[]);
  shiftTasks.forEach(t=>{const z=t.zone&&zones[t.zone]?t.zone:'barra';zones[z].push(t);});
  let total=0,done=0;shiftTasks.forEach(t=>{total++;if(getEntry(ck(rid,'d',day,t.id)).done)done++;});
  const pct=total?Math.round(done/total*100):0;
  const shiftSeg=`<div class="seg"><button class="${S.shift==='ape'?'on':''}" onclick="setShift('ape')">☀️ Apertura</button><button class="${S.shift==='cie'?'on':''}" onclick="setShift('cie')">🌙 Cierre</button></div>`;
  const activeShift=getCurrentShift();

/* ── EQUIPO (ranking wheel + list) ── */
function renderEquipo(){
  const rid=S.rid;const team=getTeam(rid);
  if(!team.length)return `<div class="empty-note">Este local aún no tiene empleados.${canEdit()?' Añádelos desde una tarea o aquí abajo.':''}</div>${canEdit()?addMemberBox():''}`;
  const ranked=team.map(m=>({...m,pct:memberPct(rid,m.id)})).sort((a,b)=>b.pct-a.pct);
  const top=ranked[0].pct>0?ranked[0]:null;const avg=Math.round(ranked.reduce((s,m)=>s+m.pct,0)/ranked.length);
  const wheel=teamWheel(ranked,avg);
  const rows=ranked.map((m,i)=>{const medal=['🥇','🥈','🥉'][i]||`${i+1}`;const col=m.pct>=75?'var(--green)':m.pct>=40?'var(--yellow)':m.pct>0?'var(--orange)':'var(--muted)';const ph=motivPhrase(m.pct);const isTop=top&&m.id===top.id;
    return `<div class="mrow ${isTop?'mrow-top':''}"><span class="rk">${medal}</span><span class="mav" style="background:linear-gradient(135deg,${m.color}cc,${m.color}66)">${memberEmoji(m)}</span><div class="mn2"><div class="mnm">${esc(m.name)}${isTop?' 👑':''}</div><div class="mph">${ph.e} ${ph.t}</div></div><span class="mp mono" style="color:${col}">${m.pct}%</span></div>`;}).join('');
  return `<div class="tp"><div class="tp-hd">🏆 Ranking del equipo · este mes</div>
    <div class="tp-cols"><div style="flex:0 0 auto;margin:0 auto">${wheel}</div><div style="flex:1;min-width:200px">${rows}</div></div>
    ${canEdit()?addMemberBox():''}</div>`;
}
function addMemberBox(){return `<div style="display:flex;gap:8px;margin-top:14px"><input class="inp" id="new-member" placeholder="Nombre del nuevo empleado"><button class="btn btn-primary" style="flex:0 0 auto" onclick="addMember()">Añadir</button></div>`;}
function teamWheel(ranked,avg){
  const SZ=170,CX=85,CY=85,R=72,IR=30;const gap=ranked.length>1?0.05:0;const seg=(2*Math.PI-gap*ranked.length)/ranked.length;let a=-Math.PI/2;
  function wedge(sa,ea,oR,iR){if(Math.abs(ea-sa)<0.001)return'';const lg=(ea-sa)>Math.PI?1:0;const ox1=CX+oR*Math.cos(sa),oy1=CY+oR*Math.sin(sa),ox2=CX+oR*Math.cos(ea),oy2=CY+oR*Math.sin(ea),ix1=CX+iR*Math.cos(ea),iy1=CY+iR*Math.sin(ea),ix2=CX+iR*Math.cos(sa),iy2=CY+iR*Math.sin(sa);return `M ${ox1} ${oy1} A ${oR} ${oR} 0 ${lg} 1 ${ox2} ${oy2} L ${ix1} ${iy1} A ${iR} ${iR} 0 ${lg} 0 ${ix2} ${iy2} Z`;}
  let paths='';
  ranked.forEach(m=>{const sa=a+gap/2;const fa=sa+seg*Math.max(m.pct/100,0.02);paths+=`<path d="${wedge(sa,fa,R,IR)}" fill="${m.color}"></path>`;
    if(seg>0.35){const mid=sa+seg/2,lr=(R+IR)/2;paths+=`<text x="${CX+lr*Math.cos(mid)}" y="${CY+lr*Math.sin(mid)+4}" text-anchor="middle" font-size="12">${memberEmoji(m)}</text>`;}
    a+=seg+gap;});
  return `<svg width="${SZ}" height="${SZ}" viewBox="0 0 ${SZ} ${SZ}" style="overflow:visible;filter:drop-shadow(0 4px 14px rgba(0,0,0,.4))">
    <circle cx="${CX}" cy="${CY}" r="${R}" fill="rgba(255,255,255,.04)"></circle>${paths}
    <circle cx="${CX}" cy="${CY}" r="${IR}" fill="var(--s1)"></circle>
    <text x="${CX}" y="${CY-4}" text-anchor="middle" fill="#E8ECF4" font-size="16" font-weight="700" font-family="Space Grotesk">${avg}%</text>
    <text x="${CX}" y="${CY+11}" text-anchor="middle" fill="#6B7280" font-size="9" font-family="Space Grotesk">mes</text></svg>`;
}

function toggleDaily(tid){

function cardCtx(el){const c=el.closest('.card');return{key:c.dataset.key,tid:c.dataset.tid,type:c.dataset.type,period:c.dataset.period,list:c.dataset.list,card:c};}

/* ════════ PHOTOS ════════ */
async function togglePhoto(el){
  const c=el.closest('.card');const area=c.querySelector('.photo-area');const key=c.dataset.key;
  const opening=!area.classList.contains('open');
  document.querySelectorAll('.photo-area.open').forEach(a=>{if(a!==area)a.classList.remove('open');});
  area.classList.toggle('open',opening);
  if(opening){
    const e=getEntry(key);
    if((!e.photos||!e.photos.length)&&!S.photoLoaded[key]){
      S.photoLoaded[key]=true;const data=await supaGetPhoto(key);
      if(data){try{const p=JSON.parse(data);e.photos=Array.isArray(p)?p:[{data,date:e.date}];}catch{e.photos=[{data,date:e.date}];}state[key]=e;persistLocal();}
    }
    renderPhotoArea(c);
  }
}
function renderPhotoArea(c){
  const key=c.dataset.key;const area=c.querySelector('.photo-area');const e=getEntry(key);const photos=e.photos||[];const MAX=3;
  let gal=photos.length?`<div class="pgal">${photos.map((p,i)=>`<div class="pw"><img src="${p.data}" onclick="showLB('${'PH'+i}')" data-full="${i}">${S.role!=='view'?`<button class="rm" onclick="rmPhoto(this,${i})">✕</button>`:''}</div>`).join('')}</div>`:'';
  let uz=(photos.length<MAX&&S.role!=='view')?`<div class="pcount">Evidencia · ${photos.length}/${MAX} fotos</div><div class="pbtns"><label class="pbtn"><span class="pi">📷</span>Hacer foto<input type="file" accept="image/*" capture="environment" onchange="addPhoto(this)"></label><label class="pbtn"><span class="pi">🖼️</span>Subir de galería<input type="file" accept="image/*" onchange="addPhoto(this)"></label></div>`:(photos.length>=MAX?`<div style="font-size:11px;color:var(--muted);text-align:center;padding:6px">Máximo ${MAX} fotos</div>`:(photos.length?'':`<div style="font-size:11px;color:var(--muted);text-align:center;padding:6px">Sin fotos</div>`));
  area.innerHTML=gal+uz;
  area.querySelectorAll('.pgal img').forEach((img,i)=>img.onclick=()=>showLB(photos[i].data));
}
function addPhoto(inp){
  const file=inp.files[0];if(!file)return;const c=inp.closest('.card');const key=c.dataset.key;
  const reader=new FileReader();reader.onload=ev=>{const img=new Image();img.onload=()=>{
    const cv=document.createElement('canvas');const MAX=500;let w=img.width,h=img.height;
    if(w>h&&w>MAX){h=Math.round(h*MAX/w);w=MAX;}else if(h>MAX){w=Math.round(w*MAX/h);h=MAX;}
    cv.width=w;cv.height=h;cv.getContext('2d').drawImage(img,0,0,w,h);
    const comp=cv.toDataURL('image/jpeg',.35);const e=getEntry(key);if(!e.photos)e.photos=[];if(e.photos.length>=3){toast('Máximo 3 fotos',true);return;}
    e.photos.push({data:comp,date:todayStr()});if(!e.done){e.done=true;e.date=todayStr();if(S.member)setWho(key,S.member.id);}state[key]=e;persistLocal();
    supaSetPhoto(key,JSON.stringify(e.photos));saveCheck(key);renderPhotoArea(c);toast('📷 Foto guardada');
  };img.src=ev.target.result;};reader.readAsDataURL(file);
}
function rmPhoto(btn,i){const c=btn.closest('.card');const key=c.dataset.key;const e=getEntry(key);if(!e.photos)return;e.photos.splice(i,1);state[key]=e;persistLocal();if(e.photos.length)supaSetPhoto(key,JSON.stringify(e.photos));else supaDelPhoto(key);renderPhotoArea(c);}

  $('edit-del').style.display=ctx.isNew?'none':'';$('edit-ov').classList.add('open');setTimeout(()=>$('edit-name').focus(),80);}
function closeEdit(){$('edit-ov').classList.remove('open');_edit=null;}
function editTask(kind,tid){const rid=S.rid;const arr=kind==='d'?getTasks(rid,S.shift):null;const t=arr.find(x=>x.id===tid);openEdit({kind:'daily',task:t,arr,rid});}
function editTaskCard(el){const {tid,list,type}=cardCtx(el);const rid=S.rid;let arr,t;
  if(list==='monthly'){arr=getTasks(rid,'monthly');t=arr.find(x=>x.id===tid);openEdit({kind:'monthly',task:t,arr,rid});}
  else{const z=list.split('.')[1];arr=getTasks(rid,'weekly')[z];t=arr.find(x=>x.id===tid);openEdit({kind:'weekly',task:t,arr,rid,zone:z});}}
function addTask(z){const rid=S.rid;ensureTasks(rid);const arr=getTasks(rid,S.shift);const t={id:(S.shift==='ape'?'da':'dc')+'_'+Date.now(),name:'',time:'',zone:z};openEdit({kind:'daily',task:t,arr,rid,isNew:true});}
function addWeekly(z){const rid=S.rid;ensureTasks(rid);if(!state.tasks[rid].weekly)state.tasks[rid].weekly={};if(!state.tasks[rid].weekly[z])state.tasks[rid].weekly[z]=[];const arr=state.tasks[rid].weekly[z];const t={id:'wt_'+Date.now(),name:'',time:'',freq:'1×SEM'};openEdit({kind:'weekly',task:t,arr,rid,zone:z,isNew:true});}
function addMonthly(){const rid=S.rid;ensureTasks(rid);if(!state.tasks[rid].monthly)state.tasks[rid].monthly=[];const arr=state.tasks[rid].monthly;const t={id:'m_'+Date.now(),label:'',time:'',weekNum:1,cls:'purple'};openEdit({kind:'monthly',task:t,arr,rid,isNew:true});}
function ensureTasks(rid){if(!state.tasks)state.tasks={};if(!state.tasks[rid])state.tasks[rid]={ape:[],cie:[],weekly:{},monthly:[]};}
$('edit-save').onclick=()=>{if(!_edit)return;const n=$('edit-name').value.trim();if(!n){toast('El nombre no puede estar vacío',true);return;}
  if(_edit.kind==='monthly')_edit.task.label=n;else _edit.task.name=n;_edit.task.time=$('edit-time').value.trim();
  if(_edit.kind==='weekly')_edit.task.freq=$('edit-freq').value;if(_edit.kind==='daily')_edit.task.zone=$('edit-zone').value;
  if(_edit.isNew)_edit.arr.push(_edit.task);persistLocal();saveTasks(_edit.rid);closeEdit();render();toast('✓ Tarea guardada');};
$('edit-del').onclick=()=>{if(!_edit||_edit.isNew)return;if(!confirm('¿Eliminar esta tarea?'))return;const i=_edit.arr.findIndex(x=>x.id===_edit.task.id);if(i>-1)_edit.arr.splice(i,1);persistLocal();saveTasks(_edit.rid);closeEdit();render();toast('Tarea eliminada');};
$('edit-cancel').onclick=closeEdit;
$('edit-ov').onclick=e=>{if(e.target===$('edit-ov'))closeEdit();};

/* ════════ PIN FLOW ════════ */
let _pin={buf:'',confirm:'',mode:'',rid:null,onOk:null};
function buildPinKeys(){$('pin-grid').innerHTML=['1','2','3','4','5','6','7','8','9','','0','⌫'].map(k=>k===''?`<button class="pk empty"></button>`:k==='⌫'?`<button class="pk" onclick="pinDel()">⌫</button>`:`<button class="pk" onclick="pinKey('${k}')">${k}</button>`).join('');}
function pinDots(){for(let i=0;i<4;i++){const d=$('pd'+i);d.classList.toggle('f',i<_pin.buf.length);d.classList.remove('e');}}
function pinShake(msg){$('pin-err').textContent=msg;for(let i=0;i<4;i++)$('pd'+i).classList.add('e');setTimeout(()=>{_pin.buf='';pinDots();},480);}
function pinKey(d){if(_pin.buf.length>=4)return;_pin.buf+=d;pinDots();if(_pin.buf.length===4)setTimeout(pinSubmit,110);}
function pinDel(){if(_pin.buf.length)_pin.buf=_pin.buf.slice(0,-1),pinDots();}
function openPin(cfg){_pin={buf:'',confirm:'',...cfg};$('pin-dot').style.cssText=`background:${cfg.color||'var(--accent)'};color:${cfg.color||'var(--accent)'}`;$('pin-name').textContent=cfg.name;$('pin-lbl').textContent=cfg.label;$('pin-err').textContent='';pinDots();$('pin-ov').classList.add('open');}
function closePin(){$('pin-ov').classList.remove('open');}
$('pin-back').onclick=closePin;
document.addEventListener('keydown',e=>{if(!$('pin-ov').classList.contains('open'))return;if(e.key>='0'&&e.key<='9')pinKey(e.key);else if(e.key==='Backspace')pinDel();});
function pinSubmit(){
  const m=_pin.mode;
  if(m==='rest'){
    const rid=_pin.rid;const has=state.pins&&state.pins[rid];
    if(_pin.buf===QUICK_VIEW_PIN){closePin();enterRestaurant(rid,null,'view');return;}
    if(!has){ // set new pin
      if(!_pin.confirm){_pin.confirm=_pin.buf;_pin.buf='';$('pin-lbl').textContent='Confirma el PIN';$('pin-err').textContent='';pinDots();}
      else if(_pin.buf===_pin.confirm){if(!state.pins)state.pins={};state.pins[rid]=pinHash(_pin.buf);persistLocal();saveConfig();closePin();openUserSelector(rid);}
      else{pinShake('No coinciden');_pin.confirm='';setTimeout(()=>$('pin-lbl').textContent='Elige un PIN de 4 dígitos',480);}
    } else if(pinHash(_pin.buf)===state.pins[rid]){closePin();openUserSelector(rid);}
    else pinShake('PIN incorrecto');
  }
  else if(m==='admin'){
    const stored=localStorage.getItem(ADMIN_PIN_KEY);
    if(!stored){if(!_pin.confirm){_pin.confirm=_pin.buf;_pin.buf='';$('pin-lbl').textContent='Confirma tu PIN de responsable';pinDots();}
      else if(_pin.buf===_pin.confirm){localStorage.setItem(ADMIN_PIN_KEY,pinHash(_pin.buf));closePin();S.view='global';S.role='admin';render();}
      else{pinShake('No coinciden');_pin.confirm='';setTimeout(()=>$('pin-lbl').textContent='Elige tu PIN de responsable',480);}}
    else if(pinHash(_pin.buf)===stored){closePin();S.view='global';S.role='admin';render();}
    else pinShake('PIN incorrecto');
  }
  else if(m==='manager'){
    const rid=_pin.rid;const stored=state.mgr_pins&&state.mgr_pins[rid];
    if(!stored){if(!_pin.confirm){_pin.confirm=_pin.buf;_pin.buf='';$('pin-lbl').textContent='Confirma el PIN de gerente';pinDots();}
      else if(_pin.buf===_pin.confirm){if(!state.mgr_pins)state.mgr_pins={};state.mgr_pins[rid]=pinHash(_pin.buf);persistLocal();saveConfig();closePin();S.role='manager';render();toast('🔑 Modo gerente activado');}
      else{pinShake('No coinciden');_pin.confirm='';setTimeout(()=>$('pin-lbl').textContent='Elige el PIN de gerente',480);}}
    else if(pinHash(_pin.buf)===stored){closePin();S.role='manager';render();toast('🔑 Modo gerente activado');}
    else pinShake('PIN incorrecto');
  }
}

/* ════════ USER SELECTOR ════════ */
function openUserSelector(rid){
  const r=restById(rid);const team=getTeam(rid);
  $('usel-name').textContent=r.name;
  const ranked=team.map(m=>({...m,pct:memberPct(rid,m.id)})).sort((a,b)=>b.pct-a.pct);const top=ranked[0]&&ranked[0].pct>0?ranked[0].id:null;
  $('usel-grid').innerHTML=ranked.map(m=>`<button class="ubtn" onclick="pickUser('${rid}','${m.id}')"><div class="uav" style="background:linear-gradient(135deg,${m.color}cc,${m.color}66)">${memberEmoji(m)}</div><div class="un">${esc(m.name)}${m.id===top?' 👑':''}</div></button>`).join('')
    +`<button class="uadd" onclick="addSelf('${rid}')">+ Soy nuevo, añadirme al equipo</button>`;
  $('usel-ov').classList.add('open');
}
function pickUser(rid,mid){const m=getTeam(rid).find(x=>x.id===mid);$('usel-ov').classList.remove('open');enterRestaurant(rid,m,'employee');}
function addSelf(rid){const n=prompt('Tu nombre:');if(!n||!n.trim())return;const team=getTeam(rid);const color=AVATAR_COLORS[team.length%AVATAR_COLORS.length];const m={id:'m_'+Date.now(),name:n.trim(),color};team.push(m);persistLocal();saveTeam(rid);$('usel-ov').classList.remove('open');enterRestaurant(rid,m,'employee');}

/* ════════ NAV ACTIONS ════════ */
function tapRestaurant(rid){const r=restById(rid);openPin({mode:'rest',rid,name:r.name,color:r.color,label:(state.pins&&state.pins[rid])?'Introduce el PIN del local':'Crea el PIN de este local'});}
function tapResponsable(){openPin({mode:'admin',name:'Responsable',color:'#FBBF24',label:localStorage.getItem(ADMIN_PIN_KEY)?'PIN de responsable':'Crea tu PIN de responsable'});}
function openManagerPin(){const r=restById(S.rid);openPin({mode:'manager',rid:S.rid,name:r.name+' · Gerente',color:'#FBBF24',label:(state.mgr_pins&&state.mgr_pins[S.rid])?'PIN de gerente':'Crea el PIN de gerente'});}
function enterRestaurant(rid,member,role){S.view='rest';S.rid=rid;S.member=member;S.role=role;S.tab='hoy';S.shift=getCurrentShift();S.onlyPending=false;S.openZones={};render();window.scrollTo(0,0);}
function openAsAdmin(rid){S.view='rest';S.rid=rid;S.member=null;S.role='admin';S.tab='hoy';S.shift=getCurrentShift();S.onlyPending=false;S.openZones={};render();window.scrollTo(0,0);}
function exitRestaurant(){if(S.role==='admin'){S.view='global';S.rid=null;render();}else backToLauncher();}
function backToLauncher(){S={...S,view:'launcher',rid:null,role:null,member:null,tab:'hoy'};render();window.scrollTo(0,0);}

function bindDynamic(){}

/* ════════ SERVICE WORKER (offline shell) ════════
   Cachea la propia página para que abra sin conexión.
   Los datos de Supabase siguen requiriendo internet, pero la app
   arranca y muestra lo último cacheado (localStorage) estando offline. */
function registerSW(){
  if(!('serviceWorker' in navigator))return;
  try{
    const swCode=`
      const C='bk-limpieza-v2';
      self.addEventListener('install',e=>{self.skipWaiting();});
      self.addEventListener('activate',e=>{e.waitUntil(self.clients.claim());});
      self.addEventListener('fetch',e=>{
        const u=new URL(e.request.url);
        if(u.hostname.indexOf('supabase')>-1)return; // datos: siempre a la red
        if(e.request.method!=='GET')return;
        e.respondWith(
          caches.open(C).then(cache=>
            fetch(e.request).then(res=>{try{cache.put(e.request,res.clone());}catch(_){}; return res;})
            .catch(()=>cache.match(e.request).then(m=>m||cache.match('./')))
          )
        );
      });`;
    const url=URL.createObjectURL(new Blob([swCode],{type:'text/javascript'}));
    navigator.serviceWorker.register(url).catch(()=>{});
  }catch(e){}
}

/* ════════ BOOT ════════ */
async function boot(){
  buildPinKeys();
  registerSW();
  const ok=await loadFromSupabase();
  $('boot').style.display='none';$('app').style.display='block';
  if(!ok)toast('Sin conexión — mostrando datos guardados',true);
  render();
}
boot();
